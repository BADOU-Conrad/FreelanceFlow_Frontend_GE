name: Check source branch

on:
  pull_request:
    branches:
      - main

jobs:
  check-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Vérifier que la PR vient de stage
        run: |
          if [ "${{ github.head_ref }}" != "stage" ]; then
            echo "❌ Merge refusé : la PR doit venir de stage, pas de ${{ github.head_ref }}"
            exit 1
          fi
          echo "✅ Source OK : stage → main"
